function parseWeaponCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) return null;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",").map(c => c.replace(/^"|"$/g, "").trim());
    if (cols.length >= 6 && cols[2]) {
      rows.push({ rarity: cols[0], type: cols[1], name: cols[2], base: cols[3], sub: cols[4], skill: cols[5] });
    }
  }
  return rows.length > 0 ? rows : null;
}

function parseAreaCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) return null;
  const areas = {};
  const typeMap = { "基礎効果": "base", "付加効果": "sub", "スキル効果": "skill" };
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",").map(c => c.replace(/^"|"$/g, "").trim());
    if (cols.length >= 3 && cols[0] && cols[1] && cols[2]) {
      const areaName = cols[0];
      const key = typeMap[cols[1]];
      if (!key) continue;
      if (!areas[areaName]) areas[areaName] = { base: [], sub: [], skill: [] };
      areas[areaName][key].push(cols[2]);
    }
  }
  return Object.keys(areas).length > 0 ? areas : null;
}

const RC = { "☆6": "#fbbf24", "☆5": "#c084fc", "☆4": "#60a5fa", "☆3": "#6ee7b7" };
const TI = { 片手剣: "⚔️", 両手剣: "🗡️", 長柄武器: "🔱", 拳銃: "🔫", アーツユニット: "💎" };

// Levenshtein距離ベースの類似度（文字の順序・編集距離を考慮）
function simScore(a, b) {
  if (a === b) return 1;
  if (!a || !b) return 0;
  const m = a.length, n = b.length;
  const row = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    let prev = row[0];
    row[0] = i;
    for (let j = 1; j <= n; j++) {
      const tmp = row[j];
      row[j] = a[i - 1] === b[j - 1] ? prev : 1 + Math.min(prev, row[j], row[j - 1]);
      prev = tmp;
    }
  }
  return 1 - row[n] / Math.max(m, n);
}

function bestMatch(line, list, threshold = 0.45) {
  let best = null, bestScore = 0;
  for (const item of list) {
    const score = simScore(line, item);
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= threshold ? { value: best, score: bestScore } : null;
}

function ScreenCapturePanel({ allEffects, onDetected, onIrregular }) {
  const canvasRef = useRef(null);
  const workerRef = useRef(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [status, setStatus] = useState("");

  useEffect(() => {
    return () => { if (workerRef.current) workerRef.current.terminate(); };
  }, []);

  const captureAndRead = async () => {
    setIsAnalyzing(true);
    setStatus("共有する画面を選択してください...");
    let stream = null;
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
      setStatus("フレームを取得中...");

      const video = Object.assign(document.createElement('video'), { muted: true });
      video.srcObject = stream;
      await new Promise((resolve, reject) => {
        video.onloadedmetadata = resolve;
        setTimeout(reject, 8000);
      });
      await video.play();
      await new Promise(resolve => setTimeout(resolve, 150));

      // 左半分だけ切り取って右パネルのテキスト混入を防ぐ、2倍に拡大してOCR精度を上げる
      const cropW = Math.round(video.videoWidth * 0.5);
      const cropH = video.videoHeight;
      const scale = 2;
      const c = canvasRef.current;
      c.width  = cropW * scale;
      c.height = cropH * scale;
      const ctx = c.getContext('2d');
      ctx.drawImage(video, 0, 0, cropW, cropH, 0, 0, c.width, c.height);

      // グレースケール化＋閾値処理: 白文字(明)→黒、金背景(暗)→白 でTesseractが読みやすくなる
      const imgData = ctx.getImageData(0, 0, c.width, c.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        const val  = gray > 210 ? 0 : 255; // 白文字→黒、背景→白
        d[i] = d[i + 1] = d[i + 2] = val;
      }
      ctx.putImageData(imgData, 0, 0);

      if (!workerRef.current) {
        setStatus("言語データ読み込み中（初回のみ）...");
        workerRef.current = await Tesseract.createWorker('jpn');
      }
      setStatus("OCR処理中...");
      const { data: { text } } = await workerRef.current.recognize(c);
      setStatus("解析中... (OCR raw: " + text.replace(/\n/g, '|').slice(0, 120) + ")");
      parseOCR(text);
    } catch (e) {
      const msg = e?.message || '';
      setStatus(msg ? "エラー: " + msg : "キャプチャをキャンセルしました");
    } finally {
      if (stream) stream.getTracks().forEach(t => t.stop());
      setIsAnalyzing(false);
    }
  };

  const parseOCR = (rawText) => {
    const lines = rawText.split('\n')
      .map(l => l
        .replace(/^[○◦・°o\s]+/, '')   // 先頭の記号・空白
        .replace(/[✏✎🖊].*/g, '')       // ✏以降を除去
        .replace(/\s*[|｜]\s*[+＋]\d.*$/, '') // | +1 を除去
        .replace(/[+＋]\d.*$/, '')       // +1 を除去
        .trim()
      )
      .filter(l => l.length >= 2);

    // 各行を効果リストにマッチング（閾値0.4）
    const tagged = lines.map(line => {
      const bm = bestMatch(line, allEffects.bases,  0.4);
      const sm = bestMatch(line, allEffects.subs,   0.4);
      const km = bestMatch(line, allEffects.skills, 0.4);
      const candidates = [
        bm ? { ...bm, type: 'base'  } : null,
        sm ? { ...sm, type: 'sub'   } : null,
        km ? { ...km, type: 'skill' } : null,
      ].filter(Boolean).sort((a, b) => b.score - a.score);
      return candidates.length ? candidates[0] : null;
    });

    // null を除外した配列でスライディングウィンドウ
    const nonNull = tagged.filter(Boolean);
    for (let i = 0; i <= nonNull.length - 3; i++) {
      const w = nonNull.slice(i, i + 3);
      const types  = w.map(x => x.type);
      const values = w.map(x => x.value);
      if (new Set(types).size === 3 && new Set(values).size === 3) {
        const result = {
          base:  w.find(x => x.type === 'base').value,
          sub:   w.find(x => x.type === 'sub').value,
          skill: w.find(x => x.type === 'skill').value,
        };
        onDetected(result);
        setStatus(`完了: ${result.base} / ${result.sub} / ${result.skill}`);
        return;
      }
    }

    // イレギュラーパターン判定（フォールバック）
    const unique = [...new Map(nonNull.map(m => [m.value, m])).values()];
    const bases  = unique.filter(m => m.type === 'base');
    const subs   = unique.filter(m => m.type === 'sub');
    const skills = unique.filter(m => m.type === 'skill');
    if (unique.length >= 3 && (bases.length !== 1 || subs.length !== 1 || skills.length !== 1)) {
      onIrregular();
      setStatus(`イレギュラー検出 (基礎×${bases.length} 付加×${subs.length} スキル×${skills.length}) → 餌確定`);
    } else {
      setStatus("読み取り失敗。OCR: " + rawText.replace(/\n/g, ' ').slice(0, 100));
    }
  };

  const statusColor = status.startsWith("完了") ? "#4ade80"
    : (status.includes("エラー") || status.includes("イレギュラー") || status.includes("失敗")) ? "#ef4444"
    : "#9ca3af";

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: "#e5e7eb" }}>📷 画面キャプチャ</span>
        <button onClick={captureAndRead} disabled={isAnalyzing} style={{
          padding: "5px 16px", borderRadius: 6, fontSize: 12, fontWeight: 700,
          border: "1px solid rgba(251,191,36,0.5)", background: "rgba(251,191,36,0.15)",
          color: isAnalyzing ? "#6b7280" : "#fbbf24",
          cursor: isAnalyzing ? "not-allowed" : "pointer",
        }}>
          {isAnalyzing ? "読み取り中..." : "🔍 キャプチャして読み取る"}
        </button>
      </div>
      <canvas ref={canvasRef} style={{ display: "none" }} />
      {status && <p style={{ fontSize: 11, marginTop: 8, color: statusColor }}>{status}</p>}
    </div>
  );
}

function App() {
  const [weapons, setWeapons] = useState(FALLBACK_WEAPONS);
  const [areas, setAreas] = useState(FALLBACK_AREAS);
  const [weaponSource, setWeaponSource] = useState("ローカル");
  const [areaSource, setAreaSource] = useState("ローカル");
  const [tab, setTab] = useState("solver");
  const [selectedWeapon, setSelectedWeapon] = useState(null);
  const [filterType, setFilterType] = useState("すべて");
  const [filterRarity, setFilterRarity] = useState("すべて");
  const [searchText, setSearchText] = useState("");
  const [loading, setLoading] = useState(false);

  const loadFromSheet = () => {
    setLoading(true);
    const wReq = fetch(WEAPON_CSV_URL).then(r => { if (!r.ok) throw new Error(); return r.text(); });
    const aReq = fetch(AREA_CSV_URL).then(r => { if (!r.ok) throw new Error(); return r.text(); });

    Promise.allSettled([wReq, aReq]).then(([wRes, aRes]) => {
      if (wRes.status === "fulfilled") {
        const p = parseWeaponCSV(wRes.value);
        if (p) { setWeapons(p); setWeaponSource("スプレッドシート"); }
        else { setWeaponSource("ローカル（解析失敗）"); }
      } else { setWeaponSource("ローカル（取得失敗）"); }

      if (aRes.status === "fulfilled") {
        const p = parseAreaCSV(aRes.value);
        if (p) { setAreas(p); setAreaSource("スプレッドシート"); }
        else { setAreaSource("ローカル（解析失敗）"); }
      } else { setAreaSource("ローカル（取得失敗）"); }
    }).finally(() => setLoading(false));
  };

  useEffect(() => { loadFromSheet(); }, []);

  const dataLabel = useMemo(() => {
    if (weaponSource === "スプレッドシート" && areaSource === "スプレッドシート") return "スプレッドシート";
    if (weaponSource === "スプレッドシート" || areaSource === "スプレッドシート") return "一部スプレッドシート";
    return "ローカル";
  }, [weaponSource, areaSource]);

  const weaponTypes = useMemo(() => ["すべて", ...new Set(weapons.map(w => w.type))], [weapons]);
  const rarities = useMemo(() => ["すべて", ...new Set(weapons.map(w => w.rarity))], [weapons]);

  const filteredWeapons = useMemo(() => {
    return weapons.filter(w => {
      if (filterType !== "すべて" && w.type !== filterType) return false;
      if (filterRarity !== "すべて" && w.rarity !== filterRarity) return false;
      if (searchText && !w.name.toLowerCase().includes(searchText.toLowerCase())) return false;
      return true;
    });
  }, [weapons, filterType, filterRarity, searchText]);

  const solverResult = useMemo(() => {
    if (!selectedWeapon) return null;
    const target = selectedWeapon;
    const areaResults = Object.entries(areas).map(([areaName, area]) => {
      const canSub = area.sub.includes(target.sub);
      const canSkill = area.skill.includes(target.skill);
      if (!canSub && !canSkill) return null;
      const patterns = [];
      const otherBases = area.base.filter(b => b !== target.base);
      const build = (lockType, lockedValue) => {
        for (let i = 0; i < otherBases.length; i++) {
          for (let j = i + 1; j < otherBases.length; j++) {
            const bases = [target.base, otherBases[i], otherBases[j]];
            const pw = weapons.filter(w => w.name !== target.name).filter(w => {
              if (!bases.includes(w.base)) return false;
              return lockType === "スキル効果"
                ? w.skill === lockedValue && area.sub.includes(w.sub)
                : w.sub === lockedValue && area.skill.includes(w.skill);
            });
            if (pw.length > 0) patterns.push({ lockType, locked: lockedValue, bases, perfectWeapons: pw, score: pw.length });
          }
        }
      };
      if (canSkill) build("スキル効果", target.skill);
      if (canSub) build("付加効果", target.sub);
      patterns.sort((a, b) => b.score - a.score);
      return { areaName, targetPerfect: canSub && canSkill, patterns: patterns.slice(0, 5) };
    }).filter(Boolean);
    areaResults.sort((a, b) => {
      if (a.targetPerfect !== b.targetPerfect) return b.targetPerfect ? 1 : -1;
      return (b.patterns[0]?.score || 0) - (a.patterns[0]?.score || 0);
    });
    return areaResults;
  }, [selectedWeapon, weapons, areas]);

  const allEffects = useMemo(() => ({
    bases: [...new Set(weapons.map(w => w.base))],
    subs: [...new Set(weapons.map(w => w.sub))],
    skills: [...new Set(weapons.map(w => w.skill))],
  }), [weapons]);

  const [fodderBase, setFodderBase] = useState("");
  const [fodderSub, setFodderSub] = useState("");
  const [fodderSkill, setFodderSkill] = useState("");
  const [isIrregular, setIsIrregular] = useState(false);

  const resetFodder = () => {
    setFodderBase(""); setFodderSub(""); setFodderSkill(""); setIsIrregular(false);
  };

  const fodderResult = useMemo(() => {
    if (isIrregular) return { isIrregular: true };
    if (!fodderBase || !fodderSub || !fodderSkill) return null;
    const perfect = weapons.filter(w => w.base === fodderBase && w.sub === fodderSub && w.skill === fodderSkill);
    return { perfect, isFodder: perfect.length === 0, isIrregular: false };
  }, [weapons, fodderBase, fodderSub, fodderSkill, isIrregular]);

  return <div style={{ minHeight: "100vh" }}>
    {/* Header */}
    <div style={{ background: "linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%)", borderBottom: "1px solid rgba(251,191,36,0.2)", padding: "14px 20px" }}>
      <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <div>
          <h1 style={{ fontSize: 18, fontWeight: 900, color: "#fbbf24", letterSpacing: 1 }}>⚗️ 基質厳選ツール</h1>
          <p style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>Endfield Substrate Optimizer</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 10, color: "#4b5563", background: "rgba(255,255,255,0.05)", padding: "2px 8px", borderRadius: 4 }}>
            {dataLabel} ({weapons.length}武器 / {Object.keys(areas).length}エリア)
          </span>
          <button onClick={loadFromSheet} disabled={loading} style={{
            fontSize: 10, padding: "2px 8px", borderRadius: 4, cursor: loading ? "wait" : "pointer",
            border: "1px solid rgba(251,191,36,0.3)", background: "rgba(251,191,36,0.1)", color: "#fbbf24", fontWeight: 700,
          }}>
            {loading ? "読込中..." : "🔄 データ更新"}
          </button>
          <div style={{ display: "flex", gap: 4 }}>
            <EffectTag label="基礎" value="" color={EC.base} />
            <EffectTag label="付加" value="" color={EC.sub} />
            <EffectTag label="スキル" value="" color={EC.skill} />
          </div>
        </div>
      </div>
    </div>

    <div style={{ maxWidth: 960, margin: "0 auto", padding: "0 16px 40px" }}>
      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, marginTop: 14, marginBottom: 14, background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: 4 }}>
        {[{id:"solver",label:"① 同時厳選ソルバー"},{id:"fodder",label:"② 餌判定"}].map(t =>
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "10px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 14,
            background: tab === t.id ? "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)" : "transparent",
            color: tab === t.id ? "#0a0a0f" : "#6b7280",
          }}>{t.label}</button>
        )}
      </div>

      {/* ① Solver */}
      {tab === "solver" && <div>
        <h3 style={{ fontSize: 15, fontWeight: 800, color: "#fbbf24", marginBottom: 6 }}>🎯 武器を選択</h3>
        <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>厳選したい武器を選ぶと、最適エリアと同時に3/3で狙える武器を計算します</p>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
          {weaponTypes.map(t => <Tag key={t} label={t === "すべて" ? "すべて" : (TI[t]||"")+" "+t} active={filterType === t} color="#fbbf24" onClick={() => setFilterType(t)} />)}
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {rarities.map(r => <Tag key={r} label={r} active={filterRarity === r} color={RC[r] || "#fbbf24"} onClick={() => setFilterRarity(r)} />)}
        </div>
        <input type="text" placeholder="🔍 武器名で検索..." value={searchText} onChange={e => setSearchText(e.target.value)}
          style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.04)", color: "#e5e7eb", fontSize: 13, marginBottom: 8, outline: "none" }}
        />

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 4, maxHeight: selectedWeapon ? 180 : 400, overflowY: "auto", padding: 2 }}>
          {filteredWeapons.map(w =>
            <WeaponCard key={w.name} weapon={w} selected={selectedWeapon?.name === w.name}
              onClick={() => setSelectedWeapon(selectedWeapon?.name === w.name ? null : w)} />
          )}
        </div>

        {selectedWeapon && solverResult && <div style={{ marginTop: 20 }}>
          <div style={{ background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.3)", borderRadius: 10, padding: "12px 16px", marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span style={{ fontSize: 22 }}>{TI[selectedWeapon.type]}</span>
              <div>
                <span style={{ fontWeight: 800, fontSize: 16, color: RC[selectedWeapon.rarity] }}>{selectedWeapon.rarity} {selectedWeapon.name}</span>
                <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                  <EffectTag label="基礎" value={selectedWeapon.base} color={EC.base} />
                  <EffectTag label="付加" value={selectedWeapon.sub} color={EC.sub} />
                  <EffectTag label="スキル" value={selectedWeapon.skill} color={EC.skill} />
                </div>
              </div>
            </div>
          </div>

          {solverResult.length === 0
            ? <p style={{ color: "#6b7280", textAlign: "center", padding: 20 }}>この武器の基質をドロップできるエリアが見つかりませんでした</p>
            : solverResult.map(ar => <div key={ar.areaName} style={{ marginBottom: 16, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, overflow: "hidden" }}>
              <div style={{ padding: "10px 16px", background: ar.targetPerfect ? "rgba(34,197,94,0.08)" : "rgba(255,255,255,0.02)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 16 }}>📍</span>
                <span style={{ fontWeight: 800, fontSize: 15, color: "#e5e7eb" }}>{ar.areaName}</span>
                {ar.targetPerfect && <span style={{ fontSize: 11, fontWeight: 700, background: "rgba(34,197,94,0.2)", color: "#4ade80", padding: "2px 8px", borderRadius: 4 }}>✦ パーフェクト可能</span>}
              </div>
              <div style={{ padding: 14 }}>
                {ar.patterns.length === 0
                  ? <p style={{ fontSize: 12, color: "#4b5563" }}>3/3一致で同時に狙える武器なし</p>
                  : ar.patterns.map((p, pi) => <div key={pi} style={{
                      marginBottom: pi < ar.patterns.length - 1 ? 14 : 0,
                      paddingBottom: pi < ar.patterns.length - 1 ? 14 : 0,
                      borderBottom: pi < ar.patterns.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none",
                    }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, color: "#9ca3af", fontWeight: 600 }}>🔒 {p.lockType}:</span>
                      <span style={{
                        fontSize: 12, fontWeight: 700,
                        color: p.lockType === "スキル効果" ? EC.skill : EC.sub,
                        background: (p.lockType === "スキル効果" ? EC.skill : EC.sub) + "18",
                        padding: "1px 8px", borderRadius: 4,
                      }}>{p.locked}</span>
                      <span style={{ fontSize: 11, color: "#9ca3af", fontWeight: 600 }}>基礎:</span>
                      {p.bases.map((b, bi) => <span key={bi} style={{
                        fontSize: 12, fontWeight: 700, color: "#e0a040",
                        background: "rgba(224,160,64,0.15)", padding: "1px 8px", borderRadius: 4,
                      }}>{b}</span>)}
                      <span style={{ fontSize: 10, fontWeight: 700, color: "#4ade80", background: "rgba(34,197,94,0.12)", padding: "1px 6px", borderRadius: 4 }}>
                        {p.perfectWeapons.length}武器
                      </span>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 4 }}>
                      {p.perfectWeapons.map(w => <WeaponCard key={w.name} weapon={w} compact />)}
                    </div>
                  </div>)
                }
              </div>
            </div>)
          }
        </div>}
      </div>}

      {/* ② Fodder */}
      {tab === "fodder" && <div>
        <h3 style={{ fontSize: 15, fontWeight: 800, color: "#fbbf24", marginBottom: 6 }}>🗑️ 餌判定チェッカー</h3>
        <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>基質の3要素を入力してください。3つすべて一致する武器がなければ餌確定です</p>

        <ScreenCapturePanel
          allEffects={allEffects}
          onDetected={({ base, sub, skill }) => {
            setIsIrregular(false);
            setFodderBase(base);
            setFodderSub(sub);
            setFodderSkill(skill);
          }}
          onIrregular={() => {
            setIsIrregular(true);
            setFodderBase(""); setFodderSub(""); setFodderSkill("");
          }}
        />

        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12 }}>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: EC.base, marginBottom: 4, display: "block" }}>基礎効果</label>
              <DarkSelect value={fodderBase} onChange={e => { setFodderBase(e.target.value); setIsIrregular(false); }} options={allEffects.bases} borderColor={EC.base} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: EC.sub, marginBottom: 4, display: "block" }}>付加効果</label>
              <DarkSelect value={fodderSub} onChange={e => { setFodderSub(e.target.value); setIsIrregular(false); }} options={allEffects.subs} borderColor={EC.sub} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 700, color: EC.skill, marginBottom: 4, display: "block" }}>スキル効果</label>
              <DarkSelect value={fodderSkill} onChange={e => { setFodderSkill(e.target.value); setIsIrregular(false); }} options={allEffects.skills} borderColor={EC.skill} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
            {(fodderBase || fodderSub || fodderSkill || isIrregular) &&
              <button onClick={resetFodder}
                style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#9ca3af", fontSize: 12, cursor: "pointer" }}>
                クリア
              </button>
            }
            <button
              onClick={() => { setIsIrregular(true); setFodderBase(""); setFodderSub(""); setFodderSkill(""); }}
              style={{ padding: "4px 12px", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: "1px solid rgba(239,68,68,0.4)", background: "rgba(239,68,68,0.1)", color: "#ef4444" }}>
              ⚡ イレギュラー（即餌）
            </button>
          </div>
        </div>

        {(!fodderBase || !fodderSub || !fodderSkill) && (fodderBase || fodderSub || fodderSkill) && !isIrregular &&
          <p style={{ fontSize: 12, color: "#6b7280", textAlign: "center", padding: 12 }}>3要素すべて選択すると判定します</p>
        }

        {fodderResult && (
          fodderResult.isIrregular
            ? <div style={{ textAlign: "center", padding: "24px 16px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 12 }}>
                <span style={{ fontSize: 32 }}>🗑️</span>
                <p style={{ fontSize: 16, fontWeight: 800, color: "#ef4444", margin: "8px 0 4px" }}>餌確定！</p>
                <p style={{ fontSize: 13, color: "#9ca3af" }}>イレギュラーパターンです。安心して食わせましょう</p>
              </div>
            : fodderResult.isFodder
              ? <div style={{ textAlign: "center", padding: "24px 16px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 12 }}>
                  <span style={{ fontSize: 32 }}>🗑️</span>
                  <p style={{ fontSize: 16, fontWeight: 800, color: "#ef4444", margin: "8px 0 4px" }}>餌確定！</p>
                  <p style={{ fontSize: 13, color: "#9ca3af" }}>この組み合わせに完全一致する武器はありません。安心して食わせましょう</p>
                </div>
              : <div>
                  <div style={{ padding: "12px 16px", background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.3)", borderRadius: 12, marginBottom: 12, textAlign: "center" }}>
                    <p style={{ fontSize: 14, fontWeight: 700, color: "#fbbf24" }}>⚠️ 完全一致する武器あり！取っておいた方がいいかも</p>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 4 }}>
                    {fodderResult.perfect.map(w => <WeaponCard key={w.name} weapon={w} />)}
                  </div>
                </div>
        )}
      </div>}
    </div>
  </div>;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
